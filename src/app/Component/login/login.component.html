<!-- login.component.html -->
<div class="min-h-screen bg-gray-50 flex flex-col">
  <div class="flex-1 flex items-center justify-center p-6 md:p-10">
    <div
      class="max-w-[1000px] w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row animate-fadeIn">
      <!-- Left Decoration Side -->
      <div class="md:w-5/12 bg-red-600 p-10 text-white flex flex-col justify-between relative overflow-hidden">
        <div class="relative z-10">
          <div
            class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mb-12 shadow-xl border border-white/30">
            <i class="fa-solid fa-bus text-3xl"></i>
          </div>
          <h1 class="text-4xl font-black tracking-tighter leading-tight mb-6 mt-4">Welcome Back to Tedbus.</h1>
          <p class="text-red-100 font-medium text-lg leading-relaxed">Log in to manage your bookings and enjoy a
            seamless travel experience.</p>
        </div>

        <div class="relative z-10 mt-12 pb-4">
          <div class="flex items-center gap-4 mb-6">
            <div class="flex -space-x-3">
              <div class="w-10 h-10 rounded-full border-2 border-red-600 bg-gray-200 overflow-hidden shadow-md"><img
                  src="https://i.pravatar.cc/100?u=4" alt=""></div>
              <div class="w-10 h-10 rounded-full border-2 border-red-600 bg-gray-200 overflow-hidden shadow-md"><img
                  src="https://i.pravatar.cc/100?u=5" alt=""></div>
              <div class="w-10 h-10 rounded-full border-2 border-red-600 bg-gray-200 overflow-hidden shadow-md"><img
                  src="https://i.pravatar.cc/100?u=6" alt=""></div>
            </div>
            <span class="text-xs font-bold text-red-100 uppercase tracking-widest">Premium Travel Network</span>
          </div>
        </div>

        <!-- Decorative Circles -->
        <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-red-500 rounded-full opacity-50 blur-3xl"></div>
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-red-400 rounded-full opacity-30 blur-3xl"></div>
      </div>

      <!-- Right Form Side -->
      <div class="flex-1 p-8 md:p-12">
        <div class="mb-10 text-center md:text-left">
          <h2 class="text-2xl font-black text-gray-800 tracking-tight mb-2">Sign In</h2>
          <p class="text-gray-400 font-medium">Please enter your credentials to continue.</p>
        </div>

        <form (ngSubmit)="onLogin()" class="space-y-6">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Email Address</label>
            <div class="relative group">
              <i
                class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-red-500 transition-colors"></i>
              <input type="email" name="email" [(ngModel)]="loginData.email" required email
                class="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-transparent focus:border-red-500 focus:bg-white rounded-2xl outline-none transition-all font-semibold text-gray-700 placeholder:text-gray-300"
                placeholder="john.doe@example.com">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Password</label>
            <div class="relative group">
              <i
                class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-red-500 transition-colors"></i>
              <input type="password" name="password" [(ngModel)]="loginData.password" required minlength="6"
                class="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-transparent focus:border-red-500 focus:bg-white rounded-2xl outline-none transition-all font-semibold text-gray-700 placeholder:text-gray-300"
                placeholder="••••••••">
            </div>
          </div>

          <div class="pt-4">
            <button type="submit"
              class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black uppercase tracking-widest text-sm rounded-2xl shadow-xl shadow-red-200 transform hover:-translate-y-0.5 transition-all active:scale-95">
              Sign In to My Account
            </button>
          </div>

          <p class="text-center text-sm font-bold text-gray-400 mt-8">
            Don't have an account?
            <a class="text-red-500 hover:text-red-600 hover:underline cursor-pointer transition-all ml-1"
              (click)="navigate('/signup')">Join Now</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
