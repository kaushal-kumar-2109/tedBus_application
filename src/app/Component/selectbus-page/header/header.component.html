<!-- header.component.html -->
<div class="bg-white border-b border-gray-100 shadow-sm py-4">
    <div class="max-w-[1400px] mx-auto px-6">
        <nav class="flex text-xs text-gray-400 mb-4 items-center gap-2">
            <a class="hover:text-red-500 transition-colors">Home</a>
            <i class="fa-solid fa-chevron-right text-[8px]"></i>
            <a class="hover:text-red-500 transition-colors">Bus Tickets</a>
            <i class="fa-solid fa-chevron-right text-[8px]"></i>
            <span class="text-gray-600 font-medium">{{departure}} to {{arrival}}</span>
        </nav>
        
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-gray-800 tracking-tight flex items-center gap-3">
                    {{departure}} 
                    <i class="fa-solid fa-arrow-right text-red-500 text-xl"></i> 
                    {{arrival}}
                </h1>
                <p class="text-sm text-gray-500 mt-1 font-medium italic">
                    <i class="fa-regular fa-calendar-check mr-1"></i> {{date}}
                </p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="bg-red-50 px-4 py-2 rounded-xl border border-red-100">
                    <span class="text-xs font-bold text-red-400 uppercase tracking-widest block">Starting from</span>
                    <span class="text-lg font-black text-red-600">₹100</span>
                </div>
                <button class="bg-white border-2 border-gray-100 hover:border-red-500 hover:text-red-500 px-6 py-2 rounded-xl font-bold transition-all duration-300 shadow-sm">
                    Modify Search
                </button>
            </div>
        </div>
    </div>
</div>
